AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AWS Serverless Granularity Research - G1 and G2 Experiment

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    Architectures:
      - arm64
    Tracing: Active
    Environment:
      Variables:
        GRANULARITY_LEVEL: G1
        INVOCATION_RATE_PER_HOUR: "0"

Resources:
  OrderG1Function128:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g1-128
      CodeUri: services/
      Handler: g1-monolithic/handler.handler
      MemorySize: 128
      Events:
        OrderApi:
          Type: HttpApi
          Properties:
            Path: /g1/order
            Method: POST
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G1
        MemoryConfig: "128"

  OrderG1Function512:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g1-512
      CodeUri: services/
      Handler: g1-monolithic/handler.handler
      MemorySize: 512
      Events:
        OrderApi:
          Type: HttpApi
          Properties:
            Path: /g1/order-512
            Method: POST
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G1
        MemoryConfig: "512"

  OrderG1Function1024:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g1-1024
      CodeUri: services/
      Handler: g1-monolithic/handler.handler
      MemorySize: 1024
      Events:
        OrderApi:
          Type: HttpApi
          Properties:
            Path: /g1/order-1024
            Method: POST
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G1
        MemoryConfig: "1024"

  OrderG2InventoryFunction128:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g2-inventory-128
      CodeUri: services/
      Handler: g2-inventory/handler.handler
      MemorySize: 128
      Environment:
        Variables:
          GRANULARITY_LEVEL: G2
          SERVICE_NAME: inventory
          MEMORY_CONFIG: "128"
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G2
        Service: inventory
        MemoryConfig: "128"

  OrderG2PaymentFunction128:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g2-payment-128
      CodeUri: services/
      Handler: g2-payment/handler.handler
      MemorySize: 128
      Environment:
        Variables:
          GRANULARITY_LEVEL: G2
          SERVICE_NAME: payment
          MEMORY_CONFIG: "128"
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G2
        Service: payment
        MemoryConfig: "128"

  OrderG2NotificationFunction128:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g2-notification-128
      CodeUri: services/
      Handler: g2-notification/handler.handler
      MemorySize: 128
      Environment:
        Variables:
          GRANULARITY_LEVEL: G2
          SERVICE_NAME: notification
          MEMORY_CONFIG: "128"
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G2
        Service: notification
        MemoryConfig: "128"

  OrderG2OrchestratorFunction128:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g2-orchestrator-128
      CodeUri: services/
      Handler: g2-orchestrator/handler.handler
      MemorySize: 128
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref OrderG2InventoryFunction128
        - LambdaInvokePolicy:
            FunctionName: !Ref OrderG2PaymentFunction128
        - LambdaInvokePolicy:
            FunctionName: !Ref OrderG2NotificationFunction128
      Environment:
        Variables:
          GRANULARITY_LEVEL: G2
          SERVICE_NAME: orchestrator
          MEMORY_CONFIG: "128"
          INVENTORY_FUNCTION_NAME: !Ref OrderG2InventoryFunction128
          PAYMENT_FUNCTION_NAME: !Ref OrderG2PaymentFunction128
          NOTIFICATION_FUNCTION_NAME: !Ref OrderG2NotificationFunction128
      Events:
        OrderApi:
          Type: HttpApi
          Properties:
            Path: /g2/order-128
            Method: POST
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G2
        Service: orchestrator
        MemoryConfig: "128"

  OrderG2InventoryFunction512:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g2-inventory-512
      CodeUri: services/
      Handler: g2-inventory/handler.handler
      MemorySize: 512
      Environment:
        Variables:
          GRANULARITY_LEVEL: G2
