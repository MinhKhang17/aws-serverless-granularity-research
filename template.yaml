        - LambdaInvokePolicy:
            FunctionName: !Ref OrderG2NotificationFunction512
      Environment:
        Variables:
          GRANULARITY_LEVEL: G2
          SERVICE_NAME: orchestrator
          MEMORY_CONFIG: "512"
          INVENTORY_FUNCTION_NAME: !Ref OrderG2InventoryFunction512
          PAYMENT_FUNCTION_NAME: !Ref OrderG2PaymentFunction512
          NOTIFICATION_FUNCTION_NAME: !Ref OrderG2NotificationFunction512
      Events:
        OrderApi:
          Type: HttpApi
          Properties:
            Path: /g2/order-512
            Method: POST
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G2
        Service: orchestrator
        MemoryConfig: "512"

  OrderG2InventoryFunction1024:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g2-inventory-1024
      CodeUri: services/
      Handler: g2-inventory/handler.handler
      MemorySize: 1024
      Environment:
        Variables:
          GRANULARITY_LEVEL: G2
          SERVICE_NAME: inventory
          MEMORY_CONFIG: "1024"
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G2
        Service: inventory
        MemoryConfig: "1024"

  OrderG2PaymentFunction1024:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g2-payment-1024
      CodeUri: services/
      Handler: g2-payment/handler.handler
      MemorySize: 1024
      Environment:
        Variables:
          GRANULARITY_LEVEL: G2
          SERVICE_NAME: payment
