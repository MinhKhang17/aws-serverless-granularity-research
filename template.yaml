  OrderG2NotificationFunction1024:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g2-notification-1024
      CodeUri: services/
      Handler: g2-notification/handler.handler
      MemorySize: 1024
      Environment:
        Variables:
          GRANULARITY_LEVEL: G2
          SERVICE_NAME: notification
          MEMORY_CONFIG: "1024"
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G2
        Service: notification
        MemoryConfig: "1024"

  OrderG2OrchestratorFunction1024:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g2-orchestrator-1024
      CodeUri: services/
      Handler: g2-orchestrator/handler.handler
      MemorySize: 1024
      Policies:
        - LambdaInvokePolicy:
            FunctionName: !Ref OrderG2InventoryFunction1024
        - LambdaInvokePolicy:
            FunctionName: !Ref OrderG2PaymentFunction1024
        - LambdaInvokePolicy:
            FunctionName: !Ref OrderG2NotificationFunction1024
      Environment:
        Variables:
          GRANULARITY_LEVEL: G2
          SERVICE_NAME: orchestrator
          MEMORY_CONFIG: "1024"
          INVENTORY_FUNCTION_NAME: !Ref OrderG2InventoryFunction1024
          PAYMENT_FUNCTION_NAME: !Ref OrderG2PaymentFunction1024
          NOTIFICATION_FUNCTION_NAME: !Ref OrderG2NotificationFunction1024
      Events:
        OrderApi:
          Type: HttpApi
