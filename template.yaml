          SERVICE_NAME: notification
          MEMORY_CONFIG: "512"
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G2
        Service: notification
        MemoryConfig: "512"

  OrderG2OrchestratorFunction512:
