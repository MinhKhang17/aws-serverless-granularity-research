AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AWS Serverless Granularity Research - G4 Ultra Fine-Grained Functions

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    Architectures:
      - arm64
    Tracing: Active
    Environment:
      Variables:
        GRANULARITY_LEVEL: G4
        INVOCATION_RATE_PER_HOUR: "1000"

Resources:
  G4ValidateRequestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g4-validate-request
      CodeUri: services/
      Handler: g4-step/handler.handler
      MemorySize: 128
      Environment:
        Variables:
          STEP_NAME: validate-request
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G4
        Service: validate-request

  G4ValidateCustomerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g4-validate-customer
      CodeUri: services/
      Handler: g4-step/handler.handler
      MemorySize: 128
      Environment:
        Variables:
          STEP_NAME: validate-customer
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G4
        Service: validate-customer

  G4NormalizeItemsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g4-normalize-items
      CodeUri: services/
      Handler: g4-step/handler.handler
      MemorySize: 128
      Environment:
        Variables:
          STEP_NAME: normalize-items
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G4
        Service: normalize-items

  G4PriceItemsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g4-price-items
      CodeUri: services/
      Handler: g4-step/handler.handler
      MemorySize: 128
      Environment:
        Variables:
          STEP_NAME: price-items
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G4
        Service: price-items

  G4CalculateDiscountFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g4-calculate-discount
      CodeUri: services/
      Handler: g4-step/handler.handler
      MemorySize: 128
      Environment:
        Variables:
          STEP_NAME: calculate-discount
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G4
        Service: calculate-discount

  G4CalculateTaxFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g4-calculate-tax
      CodeUri: services/
      Handler: g4-step/handler.handler
      MemorySize: 128
      Environment:
        Variables:
          STEP_NAME: calculate-tax
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G4
        Service: calculate-tax

  G4CheckInventoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g4-check-inventory
      CodeUri: services/
      Handler: g4-step/handler.handler
      MemorySize: 128
      Environment:
        Variables:
          STEP_NAME: check-inventory
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G4
        Service: check-inventory

  G4ReserveInventoryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g4-reserve-inventory
      CodeUri: services/
      Handler: g4-step/handler.handler
      MemorySize: 128
      Environment:
        Variables:
          STEP_NAME: reserve-inventory
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G4
        Service: reserve-inventory

  G4AuthorizePaymentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g4-authorize-payment
      CodeUri: services/
      Handler: g4-step/handler.handler
      MemorySize: 128
      Environment:
        Variables:
          STEP_NAME: authorize-payment
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G4
        Service: authorize-payment

  G4CapturePaymentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g4-capture-payment
      CodeUri: services/
      Handler: g4-step/handler.handler
      MemorySize: 128
      Environment:
        Variables:
          STEP_NAME: capture-payment
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G4
        Service: capture-payment

  G4PersistOrderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g4-persist-order
      CodeUri: services/
      Handler: g4-step/handler.handler
      MemorySize: 128
      Environment:
        Variables:
          STEP_NAME: persist-order
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G4
        Service: persist-order

  G4SendNotificationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g4-send-notification
      CodeUri: services/
      Handler: g4-step/handler.handler
      MemorySize: 128
      Environment:
        Variables:
          STEP_NAME: send-notification
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G4
        Service: send-notification

  G4Orchestrator128:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g4-orchestrator-128
      CodeUri: services/
      Handler: g4-orchestrator/handler.handler
      MemorySize: 128
      Policies:
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-validate-request
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-validate-customer
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-normalize-items
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-price-items
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-calculate-discount
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-calculate-tax
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-check-inventory
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-reserve-inventory
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-authorize-payment
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-capture-payment
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-persist-order
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-send-notification
      Environment:
        Variables:
          MEMORY_CONFIG: "128"
          VALIDATE_REQUEST_FUNCTION: research-order-g4-validate-request
          VALIDATE_CUSTOMER_FUNCTION: research-order-g4-validate-customer
          NORMALIZE_ITEMS_FUNCTION: research-order-g4-normalize-items
          PRICE_ITEMS_FUNCTION: research-order-g4-price-items
          CALCULATE_DISCOUNT_FUNCTION: research-order-g4-calculate-discount
          CALCULATE_TAX_FUNCTION: research-order-g4-calculate-tax
          CHECK_INVENTORY_FUNCTION: research-order-g4-check-inventory
          RESERVE_INVENTORY_FUNCTION: research-order-g4-reserve-inventory
          AUTHORIZE_PAYMENT_FUNCTION: research-order-g4-authorize-payment
          CAPTURE_PAYMENT_FUNCTION: research-order-g4-capture-payment
          PERSIST_ORDER_FUNCTION: research-order-g4-persist-order
          SEND_NOTIFICATION_FUNCTION: research-order-g4-send-notification
      Events:
        OrderApi:
          Type: HttpApi
          Properties:
            Path: /g4/order-128
            Method: POST
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G4
        MemoryConfig: "128"

  G4Orchestrator512:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g4-orchestrator-512
      CodeUri: services/
      Handler: g4-orchestrator/handler.handler
      MemorySize: 512
      Policies:
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-validate-request
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-validate-customer
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-normalize-items
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-price-items
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-calculate-discount
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-calculate-tax
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-check-inventory
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-reserve-inventory
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-authorize-payment
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-capture-payment
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-persist-order
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-send-notification
      Environment:
        Variables:
          MEMORY_CONFIG: "512"
          VALIDATE_REQUEST_FUNCTION: research-order-g4-validate-request
          VALIDATE_CUSTOMER_FUNCTION: research-order-g4-validate-customer
          NORMALIZE_ITEMS_FUNCTION: research-order-g4-normalize-items
          PRICE_ITEMS_FUNCTION: research-order-g4-price-items
          CALCULATE_DISCOUNT_FUNCTION: research-order-g4-calculate-discount
          CALCULATE_TAX_FUNCTION: research-order-g4-calculate-tax
          CHECK_INVENTORY_FUNCTION: research-order-g4-check-inventory
          RESERVE_INVENTORY_FUNCTION: research-order-g4-reserve-inventory
          AUTHORIZE_PAYMENT_FUNCTION: research-order-g4-authorize-payment
          CAPTURE_PAYMENT_FUNCTION: research-order-g4-capture-payment
          PERSIST_ORDER_FUNCTION: research-order-g4-persist-order
          SEND_NOTIFICATION_FUNCTION: research-order-g4-send-notification
      Events:
        OrderApi:
          Type: HttpApi
          Properties:
            Path: /g4/order-512
            Method: POST
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G4
        MemoryConfig: "512"

  G4Orchestrator1024:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: research-order-g4-orchestrator-1024
      CodeUri: services/
      Handler: g4-orchestrator/handler.handler
      MemorySize: 1024
      Policies:
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-validate-request
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-validate-customer
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-normalize-items
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-price-items
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-calculate-discount
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-calculate-tax
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-check-inventory
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-reserve-inventory
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-authorize-payment
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-capture-payment
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-persist-order
        - LambdaInvokePolicy:
            FunctionName: research-order-g4-send-notification
      Environment:
        Variables:
          MEMORY_CONFIG: "1024"
          VALIDATE_REQUEST_FUNCTION: research-order-g4-validate-request
          VALIDATE_CUSTOMER_FUNCTION: research-order-g4-validate-customer
          NORMALIZE_ITEMS_FUNCTION: research-order-g4-normalize-items
          PRICE_ITEMS_FUNCTION: research-order-g4-price-items
          CALCULATE_DISCOUNT_FUNCTION: research-order-g4-calculate-discount
          CALCULATE_TAX_FUNCTION: research-order-g4-calculate-tax
          CHECK_INVENTORY_FUNCTION: research-order-g4-check-inventory
          RESERVE_INVENTORY_FUNCTION: research-order-g4-reserve-inventory
          AUTHORIZE_PAYMENT_FUNCTION: research-order-g4-authorize-payment
          CAPTURE_PAYMENT_FUNCTION: research-order-g4-capture-payment
          PERSIST_ORDER_FUNCTION: research-order-g4-persist-order
          SEND_NOTIFICATION_FUNCTION: research-order-g4-send-notification
      Events:
        OrderApi:
          Type: HttpApi
          Properties:
            Path: /g4/order-1024
            Method: POST
      Tags:
        Project: serverless-granularity-research
        GranularityLevel: G4
        MemoryConfig: "1024"

Outputs:
  G4ApiEndpoint:
    Description: API Gateway endpoint URL for G4
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"